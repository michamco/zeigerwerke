<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="caseGrad5" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="55%" stop-color="#d4d4d4"/>
      <stop offset="100%" stop-color="#7a7a7a"/>
    </radialGradient>
    <radialGradient id="dialGrad5" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#f0e6f5"/>
      <stop offset="80%" stop-color="#e2cce0"/>
      <stop offset="100%" stop-color="#d4b5d4"/>
    </radialGradient>
    <linearGradient id="strap5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf5ea"/>
      <stop offset="50%" stop-color="#ebe1cd"/>
      <stop offset="100%" stop-color="#c5b89c"/>
    </linearGradient>
    <filter id="softShadow5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cream strap top -->
  <path d="M240 40 Q240 80 255 130 L345 130 Q360 80 360 40 Z" fill="url(#strap5)"/>
  <line x1="252" y1="60" x2="348" y2="60" stroke="#8a6442" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="252" y1="100" x2="348" y2="100" stroke="#8a6442" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.5"/>

  <!-- Strap bottom -->
  <path d="M240 760 Q240 720 255 670 L345 670 Q360 720 360 760 Z" fill="url(#strap5)"/>
  <line x1="252" y1="740" x2="348" y2="740" stroke="#8a6442" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="252" y1="700" x2="348" y2="700" stroke="#8a6442" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.5"/>

  <!-- Lugs -->
  <path d="M230 130 Q230 158 245 172 L262 162 L258 130 Z" fill="url(#caseGrad5)"/>
  <path d="M370 130 Q370 158 355 172 L338 162 L342 130 Z" fill="url(#caseGrad5)"/>
  <path d="M230 670 Q230 642 245 628 L262 638 L258 670 Z" fill="url(#caseGrad5)"/>
  <path d="M370 670 Q370 642 355 628 L338 638 L342 670 Z" fill="url(#caseGrad5)"/>

  <!-- Crown with tiny gem -->
  <rect x="432" y="392" width="18" height="16" rx="2" fill="url(#caseGrad5)"/>
  <circle cx="441" cy="400" r="3" fill="#9bb8e0" stroke="#7a7a7a" stroke-width="0.5"/>

  <!-- Case (smaller, more delicate) -->
  <circle cx="300" cy="400" r="155" fill="url(#caseGrad5)" filter="url(#softShadow5)"/>
  <!-- Diamond bezel — tiny circles -->
  <g fill="#ffffff" stroke="#c0c0c0" stroke-width="0.3">
    <g id="diaRing">
      <!-- 24 diamonds in a ring -->
    </g>
  </g>
  <g>
    <!-- procedurally — 24 diamonds (approx) -->
    <g fill="#ffffff" stroke="#a0a0a0" stroke-width="0.3" opacity="0.95">
      <circle cx="300" cy="252" r="3.5"/>
      <circle cx="338" cy="257" r="3.5"/>
      <circle cx="374" cy="271" r="3.5"/>
      <circle cx="404" cy="294" r="3.5"/>
      <circle cx="427" cy="324" r="3.5"/>
      <circle cx="441" cy="361" r="3.5"/>
      <circle cx="446" cy="400" r="3.5"/>
      <circle cx="441" cy="439" r="3.5"/>
      <circle cx="427" cy="476" r="3.5"/>
      <circle cx="404" cy="506" r="3.5"/>
      <circle cx="374" cy="529" r="3.5"/>
      <circle cx="338" cy="543" r="3.5"/>
      <circle cx="300" cy="548" r="3.5"/>
      <circle cx="262" cy="543" r="3.5"/>
      <circle cx="226" cy="529" r="3.5"/>
      <circle cx="196" cy="506" r="3.5"/>
      <circle cx="173" cy="476" r="3.5"/>
      <circle cx="159" cy="439" r="3.5"/>
      <circle cx="154" cy="400" r="3.5"/>
      <circle cx="159" cy="361" r="3.5"/>
      <circle cx="173" cy="324" r="3.5"/>
      <circle cx="196" cy="294" r="3.5"/>
      <circle cx="226" cy="271" r="3.5"/>
      <circle cx="262" cy="257" r="3.5"/>
    </g>
  </g>

  <!-- Inner case -->
  <circle cx="300" cy="400" r="135" fill="url(#caseGrad5)" stroke="#a0a0a0" stroke-width="0.5"/>

  <!-- Mother-of-pearl dial -->
  <circle cx="300" cy="400" r="128" fill="url(#dialGrad5)"/>
  <!-- iridescent shimmer -->
  <ellipse cx="270" cy="370" rx="75" ry="30" fill="#fff" opacity="0.18" transform="rotate(-20 270 370)"/>
  <ellipse cx="335" cy="430" rx="40" ry="15" fill="#d4f0e0" opacity="0.2" transform="rotate(15 335 430)"/>

  <!-- Hour markers -delicate diamond markers -->
  <g fill="#ffffff" stroke="#a0a0a0" stroke-width="0.3">
    <circle cx="300" cy="290" r="2.5"/>
    <circle cx="354" cy="305" r="2.5"/>
    <circle cx="395" cy="346" r="2.5"/>
    <circle cx="410" cy="400" r="2.5"/>
    <circle cx="395" cy="454" r="2.5"/>
    <circle cx="354" cy="495" r="2.5"/>
    <circle cx="300" cy="510" r="2.5"/>
    <circle cx="246" cy="495" r="2.5"/>
    <circle cx="205" cy="454" r="2.5"/>
    <circle cx="190" cy="400" r="2.5"/>
    <circle cx="205" cy="346" r="2.5"/>
    <circle cx="246" cy="305" r="2.5"/>
  </g>

  <!-- Brand -->
  <text x="300" y="372" font-family="Cormorant Garamond, serif" font-style="italic" font-weight="400" font-size="13" fill="#7a4d8c" text-anchor="middle" letter-spacing="1.5">Zeigerwerke</text>
  <text x="300" y="386" font-family="Inter Tight, sans-serif" font-size="4" fill="#7a4d8c" text-anchor="middle" letter-spacing="3" opacity="0.7">PERLE · COLLECTION</text>

  <!-- Slim blued hands -->
  <g>
    <line x1="300" y1="400" x2="300" y2="306" stroke="#1a3160" stroke-width="2"/>
  </g>
  <g transform="rotate(85 300 400)">
    <line x1="300" y1="400" x2="300" y2="285" stroke="#1a3160" stroke-width="1.5"/>
  </g>
  <g transform="rotate(220 300 400)">
    <line x1="300" y1="400" x2="300" y2="290" stroke="#c9a96a" stroke-width="0.7"/>
  </g>
  <circle cx="300" cy="400" r="3.5" fill="#c9a96a"/>
  <circle cx="300" cy="400" r="1.5" fill="#1a3160"/>

  <!-- Sapphire highlight -->
  <ellipse cx="245" cy="320" rx="55" ry="20" fill="#ffffff" opacity="0.15" transform="rotate(-25 245 320)"/>
</svg>
