<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="caseGrad6" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3d3d3d"/>
      <stop offset="55%" stop-color="#1f1f1f"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="dialGrad6" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="60%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="strap6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2818"/>
      <stop offset="50%" stop-color="#5a3e26"/>
      <stop offset="100%" stop-color="#2a1c10"/>
    </linearGradient>
    <pattern id="leather6" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#3a2818"/>
      <circle cx="4" cy="4" r="0.5" fill="#5a3e26" opacity="0.5"/>
    </pattern>
    <filter id="softShadow6" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Vintage leather strap -->
  <path d="M225 40 Q225 80 245 130 L355 130 Q375 80 375 40 Z" fill="url(#leather6)"/>
  <line x1="247" y1="70" x2="353" y2="70" stroke="#c9a96a" stroke-width="0.6" opacity="0.4"/>
  <line x1="247" y1="110" x2="353" y2="110" stroke="#c9a96a" stroke-width="0.6" opacity="0.4"/>

  <path d="M225 760 Q225 720 245 670 L355 670 Q375 720 375 760 Z" fill="url(#leather6)"/>
  <line x1="247" y1="730" x2="353" y2="730" stroke="#c9a96a" stroke-width="0.6" opacity="0.4"/>
  <line x1="247" y1="690" x2="353" y2="690" stroke="#c9a96a" stroke-width="0.6" opacity="0.4"/>

  <!-- Lugs - chunky pilot style -->
  <path d="M225 130 L225 170 L260 170 L260 130 Z" fill="url(#caseGrad6)"/>
  <path d="M340 130 L340 170 L375 170 L375 130 Z" fill="url(#caseGrad6)"/>
  <path d="M225 670 L225 630 L260 630 L260 670 Z" fill="url(#caseGrad6)"/>
  <path d="M340 670 L340 630 L375 630 L375 670 Z" fill="url(#caseGrad6)"/>

  <!-- Big onion crown -->
  <ellipse cx="445" cy="400" rx="14" ry="20" fill="url(#caseGrad6)"/>
  <line x1="437" y1="385" x2="453" y2="385" stroke="#3d3d3d" stroke-width="0.5"/>
  <line x1="437" y1="395" x2="453" y2="395" stroke="#3d3d3d" stroke-width="0.5"/>
  <line x1="437" y1="405" x2="453" y2="405" stroke="#3d3d3d" stroke-width="0.5"/>
  <line x1="437" y1="415" x2="453" y2="415" stroke="#3d3d3d" stroke-width="0.5"/>

  <!-- Case -->
  <circle cx="300" cy="400" r="175" fill="url(#caseGrad6)" filter="url(#softShadow6)"/>
  <circle cx="300" cy="400" r="158" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="0.6"/>

  <!-- Dial - black with patina -->
  <circle cx="300" cy="400" r="148" fill="url(#dialGrad6)"/>

  <!-- Triangle marker at 12 -->
  <polygon points="300,272 290,290 310,290" fill="#e8d09a"/>
  <circle cx="291" cy="285" r="1.5" fill="#1a1a1a"/>
  <circle cx="309" cy="285" r="1.5" fill="#1a1a1a"/>

  <!-- Big arabic numerals -->
  <g font-family="Cormorant Garamond, serif" font-weight="400" fill="#e8d09a" text-anchor="middle">
    <text x="408" y="416" font-size="36">3</text>
    <text x="300" y="540" font-size="36">6</text>
    <text x="192" y="416" font-size="36">9</text>
    <text x="370" y="312" font-size="22" opacity="0.85">2</text>
    <text x="390" y="500" font-size="22" opacity="0.85">5</text>
    <text x="230" y="500" font-size="22" opacity="0.85">7</text>
    <text x="210" y="312" font-size="22" opacity="0.85">11</text>
    <text x="335" y="295" font-size="22" opacity="0.85">1</text>
    <text x="265" y="295" font-size="22" opacity="0.85">10</text>
    <text x="335" y="535" font-size="22" opacity="0.85">8</text>
    <text x="265" y="535" font-size="22" opacity="0.85">4</text>
  </g>

  <!-- Minute track -->
  <g stroke="#e8d09a" stroke-width="0.5" opacity="0.55" fill="none">
    <circle cx="300" cy="400" r="138"/>
  </g>
  <g stroke="#e8d09a" stroke-width="0.4" opacity="0.6">
    <line x1="300" y1="262" x2="300" y2="270"/>
    <line x1="438" y1="400" x2="430" y2="400"/>
    <line x1="300" y1="538" x2="300" y2="530"/>
    <line x1="162" y1="400" x2="170" y2="400"/>
  </g>

  <!-- Brand -->
  <text x="300" y="370" font-family="Cormorant Garamond, serif" font-style="italic" font-weight="400" font-size="14" fill="#e8d09a" text-anchor="middle" letter-spacing="1.5">Zeigerwerke</text>
  <text x="300" y="384" font-family="Inter Tight, sans-serif" font-size="5" fill="#e8d09a" text-anchor="middle" letter-spacing="3" opacity="0.7">FLIEGER · TYPE B-UHR</text>

  <!-- Hands - pilot style with patina -->
  <g>
    <polygon points="300,400 296,300 300,290 304,300" fill="#e8d09a"/>
    <line x1="300" y1="290" x2="300" y2="320" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <g transform="rotate(120 300 400)">
    <polygon points="300,400 296,275 300,265 304,275" fill="#e8d09a"/>
    <line x1="300" y1="265" x2="300" y2="290" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <g transform="rotate(285 300 400)">
    <line x1="300" y1="400" x2="300" y2="280" stroke="#c0392b" stroke-width="1"/>
    <polygon points="296,290 300,278 304,290" fill="#c0392b"/>
  </g>

  <circle cx="300" cy="400" r="6" fill="#e8d09a"/>
  <circle cx="300" cy="400" r="2.5" fill="#1a1a1a"/>

  <!-- Sapphire highlight -->
  <ellipse cx="245" cy="320" rx="58" ry="20" fill="#ffffff" opacity="0.05" transform="rotate(-25 245 320)"/>
</svg>
