<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="caseGrad2" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#e8e8ec"/>
      <stop offset="55%" stop-color="#a3a8b0"/>
      <stop offset="100%" stop-color="#5e646e"/>
    </radialGradient>
    <radialGradient id="dialGrad2" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#27406e"/>
      <stop offset="60%" stop-color="#142f5e"/>
      <stop offset="100%" stop-color="#08183a"/>
    </radialGradient>
    <linearGradient id="bracelet2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b6bac1"/>
      <stop offset="50%" stop-color="#8a8f97"/>
      <stop offset="100%" stop-color="#5d6269"/>
    </linearGradient>
    <linearGradient id="bezelHL2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="guilloche2" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <path d="M0 6 L6 0" stroke="#0a1d4a" stroke-width="0.4" opacity="0.5"/>
      <path d="M0 0 L6 6" stroke="#0a1d4a" stroke-width="0.4" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Bracelet top -->
  <g fill="url(#bracelet2)">
    <rect x="225" y="40" width="150" height="22" rx="3"/>
    <rect x="225" y="68" width="150" height="22" rx="3"/>
    <rect x="225" y="96" width="150" height="22" rx="3"/>
  </g>
  <g stroke="#5d6269" stroke-width="0.5" opacity="0.6">
    <line x1="240" y1="40" x2="240" y2="118"/>
    <line x1="265" y1="40" x2="265" y2="118"/>
    <line x1="300" y1="40" x2="300" y2="118"/>
    <line x1="335" y1="40" x2="335" y2="118"/>
    <line x1="360" y1="40" x2="360" y2="118"/>
  </g>

  <!-- Bracelet bottom -->
  <g fill="url(#bracelet2)">
    <rect x="225" y="682" width="150" height="22" rx="3"/>
    <rect x="225" y="710" width="150" height="22" rx="3"/>
    <rect x="225" y="738" width="150" height="22" rx="3"/>
  </g>
  <g stroke="#5d6269" stroke-width="0.5" opacity="0.6">
    <line x1="240" y1="682" x2="240" y2="760"/>
    <line x1="265" y1="682" x2="265" y2="760"/>
    <line x1="300" y1="682" x2="300" y2="760"/>
    <line x1="335" y1="682" x2="335" y2="760"/>
    <line x1="360" y1="682" x2="360" y2="760"/>
  </g>

  <!-- Lugs -->
  <path d="M225 130 L225 160 L260 160 L260 130 Z" fill="url(#caseGrad2)"/>
  <path d="M340 130 L340 160 L375 160 L375 130 Z" fill="url(#caseGrad2)"/>
  <path d="M225 670 L225 640 L260 640 L260 670 Z" fill="url(#caseGrad2)"/>
  <path d="M340 670 L340 640 L375 640 L375 670 Z" fill="url(#caseGrad2)"/>

  <!-- Crown with guards -->
  <path d="M438 380 L460 380 L460 420 L438 420 Z" fill="url(#caseGrad2)"/>
  <rect x="455" y="392" width="14" height="16" rx="1" fill="url(#caseGrad2)"/>
  <line x1="457" y1="395" x2="467" y2="395" stroke="#5d6269" stroke-width="0.5"/>
  <line x1="457" y1="400" x2="467" y2="400" stroke="#5d6269" stroke-width="0.5"/>
  <line x1="457" y1="405" x2="467" y2="405" stroke="#5d6269" stroke-width="0.5"/>

  <!-- Pushers -->
  <rect x="440" y="345" width="18" height="10" rx="1" fill="url(#caseGrad2)"/>
  <rect x="440" y="445" width="18" height="10" rx="1" fill="url(#caseGrad2)"/>

  <!-- Case outer -->
  <circle cx="300" cy="400" r="170" fill="url(#caseGrad2)" filter="url(#softShadow2)"/>
  <circle cx="300" cy="400" r="170" fill="url(#bezelHL2)"/>

  <!-- Bezel with tachymeter markings -->
  <circle cx="300" cy="400" r="158" fill="#1a3160" stroke="#5d6269" stroke-width="0.5"/>
  <g font-family="Inter Tight, sans-serif" font-size="9" fill="#e8e8ec" text-anchor="middle" font-weight="500">
    <text x="300" y="258" letter-spacing="1">60</text>
    <text x="378" y="280">10</text>
    <text x="424" y="335">20</text>
    <text x="424" y="408">30</text>
    <text x="424" y="475">40</text>
    <text x="378" y="528">50</text>
    <text x="222" y="528">10</text>
    <text x="176" y="475">20</text>
    <text x="176" y="408">30</text>
    <text x="176" y="335">20</text>
    <text x="222" y="280">10</text>
  </g>
  <g stroke="#e8e8ec" stroke-width="0.6" opacity="0.6">
    <line x1="300" y1="245" x2="300" y2="252"/>
    <line x1="455" y1="400" x2="448" y2="400"/>
    <line x1="300" y1="555" x2="300" y2="548"/>
    <line x1="145" y1="400" x2="152" y2="400"/>
  </g>

  <!-- Inner case ring -->
  <circle cx="300" cy="400" r="146" fill="#0c1d44"/>
  
  <!-- Dial with subtle guilloche -->
  <circle cx="300" cy="400" r="142" fill="url(#dialGrad2)"/>
  <circle cx="300" cy="400" r="142" fill="url(#guilloche2)" opacity="0.3"/>

  <!-- Hour markers - applied indices -->
  <g fill="#e8e8ec">
    <rect x="297" y="270" width="6" height="20" rx="1"/>
    <rect x="395" y="397" width="20" height="6" rx="1"/>
    <rect x="297" y="510" width="6" height="20" rx="1"/>
    <rect x="185" y="397" width="20" height="6" rx="1"/>
  </g>
  <g fill="#e8e8ec">
    <circle cx="368" cy="307" r="4"/>
    <circle cx="416" cy="357" r="4"/>
    <circle cx="416" cy="443" r="4"/>
    <circle cx="368" cy="493" r="4"/>
    <circle cx="232" cy="493" r="4"/>
    <circle cx="184" cy="443" r="4"/>
    <circle cx="184" cy="357" r="4"/>
    <circle cx="232" cy="307" r="4"/>
  </g>

  <!-- Brand -->
  <text x="300" y="350" font-family="Cormorant Garamond, serif" font-style="italic" font-weight="400" font-size="15" fill="#e8e8ec" text-anchor="middle" letter-spacing="1.5">Zeigerwerke</text>
  <text x="300" y="367" font-family="Inter Tight, sans-serif" font-size="5" fill="#a3a8b0" text-anchor="middle" letter-spacing="3">CHRONOMÈTRE · AUTOMATIC</text>

  <!-- Subdial 30 min counter at 3 -->
  <circle cx="370" cy="400" r="34" fill="#08183a" stroke="#27406e" stroke-width="0.6"/>
  <g stroke="#a3a8b0" stroke-width="0.4">
    <line x1="370" y1="372" x2="370" y2="376"/>
    <line x1="398" y1="400" x2="394" y2="400"/>
    <line x1="370" y1="428" x2="370" y2="424"/>
    <line x1="342" y1="400" x2="346" y2="400"/>
  </g>
  <text x="370" y="383" font-family="Inter Tight, sans-serif" font-size="5" fill="#a3a8b0" text-anchor="middle" letter-spacing="2">30</text>
  <line x1="370" y1="400" x2="370" y2="378" stroke="#c9a96a" stroke-width="1.2"/>
  <circle cx="370" cy="400" r="2" fill="#c9a96a"/>

  <!-- Subdial small seconds at 9 -->
  <circle cx="230" cy="400" r="34" fill="#08183a" stroke="#27406e" stroke-width="0.6"/>
  <g stroke="#a3a8b0" stroke-width="0.4">
    <line x1="230" y1="372" x2="230" y2="376"/>
    <line x1="258" y1="400" x2="254" y2="400"/>
    <line x1="230" y1="428" x2="230" y2="424"/>
    <line x1="202" y1="400" x2="206" y2="400"/>
  </g>
  <line x1="230" y1="400" x2="240" y2="378" stroke="#e8e8ec" stroke-width="0.8"/>
  <circle cx="230" cy="400" r="1.8" fill="#e8e8ec"/>

  <!-- Date window at 6 -->
  <rect x="290" y="450" width="20" height="14" fill="#fbf5ea" stroke="#c9a96a" stroke-width="0.6"/>
  <text x="300" y="461" font-family="Inter Tight, sans-serif" font-size="9" fill="#0a1933" text-anchor="middle" font-weight="500">14</text>

  <!-- Hands - lume tipped -->
  <g>
    <polygon points="300,400 295,310 300,300 305,310" fill="#e8e8ec"/>
    <polygon points="300,400 297,310 300,300 303,310" fill="#fff3d8" opacity="0.5"/>
  </g>
  <g transform="rotate(75 300 400)">
    <polygon points="300,400 296,275 300,265 304,275" fill="#e8e8ec"/>
  </g>
  <!-- Chrono seconds (red) -->
  <g transform="rotate(140 300 400)">
    <line x1="300" y1="400" x2="300" y2="252" stroke="#c0392b" stroke-width="1.4"/>
    <circle cx="300" cy="270" r="3" fill="#c0392b"/>
  </g>

  <circle cx="300" cy="400" r="5" fill="#c9a96a"/>
  <circle cx="300" cy="400" r="2.2" fill="#08183a"/>

  <!-- Sapphire highlight -->
  <ellipse cx="248" cy="320" rx="55" ry="22" fill="#ffffff" opacity="0.08" transform="rotate(-25 248 320)"/>
</svg>
