<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <radialGradient id="caseGrad4" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f5dcb6"/>
      <stop offset="55%" stop-color="#d6a878"/>
      <stop offset="100%" stop-color="#8a6442"/>
    </radialGradient>
    <radialGradient id="dialGrad4" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fbf5ea"/>
      <stop offset="80%" stop-color="#ebe1cd"/>
      <stop offset="100%" stop-color="#c5b89c"/>
    </radialGradient>
    <linearGradient id="strap4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d3027"/>
      <stop offset="50%" stop-color="#7a3f33"/>
      <stop offset="100%" stop-color="#3d1f19"/>
    </linearGradient>
    <filter id="softShadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Burgundy strap top -->
  <path d="M230 40 Q230 80 250 130 L350 130 Q370 80 370 40 Z" fill="url(#strap4)"/>
  <line x1="245" y1="55" x2="355" y2="55" stroke="#c9a96a" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>
  <line x1="245" y1="105" x2="355" y2="105" stroke="#c9a96a" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>

  <!-- Strap bottom -->
  <path d="M230 760 Q230 720 250 670 L350 670 Q370 720 370 760 Z" fill="url(#strap4)"/>
  <line x1="245" y1="745" x2="355" y2="745" stroke="#c9a96a" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>
  <line x1="245" y1="695" x2="355" y2="695" stroke="#c9a96a" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>

  <!-- Lugs -->
  <path d="M225 130 Q225 160 240 175 L260 165 L255 130 Z" fill="url(#caseGrad4)"/>
  <path d="M375 130 Q375 160 360 175 L340 165 L345 130 Z" fill="url(#caseGrad4)"/>
  <path d="M225 670 Q225 640 240 625 L260 635 L255 670 Z" fill="url(#caseGrad4)"/>
  <path d="M375 670 Q375 640 360 625 L340 635 L345 670 Z" fill="url(#caseGrad4)"/>

  <!-- Crown -->
  <rect x="430" y="385" width="22" height="30" rx="2" fill="url(#caseGrad4)"/>
  <rect x="430" y="388" width="22" height="3" fill="#5d4530" opacity="0.4"/>
  <rect x="430" y="396" width="22" height="3" fill="#5d4530" opacity="0.4"/>
  <rect x="430" y="404" width="22" height="3" fill="#5d4530" opacity="0.4"/>

  <!-- Case -->
  <circle cx="300" cy="400" r="170" fill="url(#caseGrad4)" filter="url(#softShadow4)"/>
  <circle cx="300" cy="400" r="155" fill="none" stroke="#8a6442" stroke-width="1" opacity="0.6"/>

  <!-- Dial -->
  <circle cx="300" cy="400" r="148" fill="url(#dialGrad4)"/>

  <!-- OPEN HEART — show movement -->
  <circle cx="300" cy="465" r="36" fill="#22344f" opacity="0.95"/>
  <circle cx="300" cy="465" r="36" fill="none" stroke="#8a6442" stroke-width="1"/>
  <!-- Balance wheel -->
  <circle cx="300" cy="465" r="28" fill="none" stroke="#c9a96a" stroke-width="1.4"/>
  <g stroke="#c9a96a" stroke-width="1" fill="none">
    <line x1="272" y1="465" x2="328" y2="465"/>
    <line x1="300" y1="437" x2="300" y2="493"/>
    <line x1="280" y1="445" x2="320" y2="485"/>
    <line x1="320" y1="445" x2="280" y2="485"/>
  </g>
  <circle cx="300" cy="465" r="6" fill="#c9a96a"/>
  <circle cx="300" cy="465" r="2.5" fill="#3d2a18"/>
  <!-- Hairspring concentric -->
  <g fill="none" stroke="#c9a96a" stroke-width="0.4" opacity="0.7">
    <circle cx="300" cy="465" r="8"/>
    <circle cx="300" cy="465" r="11"/>
    <circle cx="300" cy="465" r="14"/>
  </g>
  <!-- Pallet jewels (red) -->
  <circle cx="278" cy="445" r="2.2" fill="#c0392b"/>
  <circle cx="322" cy="445" r="2.2" fill="#c0392b"/>

  <!-- Hour markers - delicate Roman -->
  <g font-family="Cormorant Garamond, serif" font-style="italic" font-weight="400" fill="#3d2a18" text-anchor="middle">
    <text x="300" y="290" font-size="22">XII</text>
    <text x="406" y="408" font-size="22">III</text>
    <text x="194" y="408" font-size="22">IX</text>
    <text x="368" y="312" font-size="14" opacity="0.85">I</text>
    <text x="395" y="345" font-size="14" opacity="0.85">II</text>
    <text x="395" y="465" font-size="14" opacity="0.85">IV</text>
    <text x="365" y="498" font-size="14" opacity="0.85">V</text>
    <text x="237" y="498" font-size="14" opacity="0.85">VII</text>
    <text x="207" y="465" font-size="14" opacity="0.85">VIII</text>
    <text x="207" y="345" font-size="14" opacity="0.85">X</text>
    <text x="237" y="312" font-size="14" opacity="0.85">XI</text>
  </g>

  <!-- Brand -->
  <text x="300" y="350" font-family="Cormorant Garamond, serif" font-style="italic" font-weight="400" font-size="15" fill="#3d2a18" text-anchor="middle" letter-spacing="1.5">Zeigerwerke</text>
  <text x="300" y="367" font-family="Inter Tight, sans-serif" font-size="5" fill="#8a6442" text-anchor="middle" letter-spacing="3">CŒUR OUVERT · MANUFAKTUR</text>

  <!-- Hands -->
  <g>
    <polygon points="300,400 294,330 300,322 306,330" fill="#3d2a18"/>
  </g>
  <g transform="rotate(50 300 400)">
    <polygon points="300,400 296,290 300,280 304,290" fill="#3d2a18"/>
  </g>
  <circle cx="300" cy="400" r="5" fill="#c9a96a"/>
  <circle cx="300" cy="400" r="2.2" fill="#3d2a18"/>

  <!-- Sapphire highlight -->
  <ellipse cx="245" cy="320" rx="58" ry="20" fill="#ffffff" opacity="0.08" transform="rotate(-25 245 320)"/>
</svg>
